[build-system]
requires = ["setuptools>=69"]
build-backend = "setuptools.build_meta"

[project]
name = "probaboracle"
version = "0.1.0"
description = "Local CLI mini app that's probably an oracle."
readme = "README.md"
requires-python = ">=3.10"
dependencies = [
  "openai-agents==0.14.7",
]

[project.scripts]
probaboracle = "probaboracle.main:main"

[tool.setuptools]
package-dir = {"" = "src"}

[tool.setuptools.packages.find]
where = ["src"]
