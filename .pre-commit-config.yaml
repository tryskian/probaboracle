default_install_hook_types:
  - pre-commit
  - pre-push

repos:
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v6.0.0
    hooks:
      - id: trailing-whitespace
      - id: end-of-file-fixer
      - id: check-merge-conflict

  - repo: local
    hooks:
      - id: probaboracle-format-check
        name: probaboracle format check
        entry: make format-check
        language: system
        pass_filenames: false
        stages: [pre-commit, manual]

      - id: probaboracle-lint
        name: probaboracle lint
        entry: make lint
        language: system
        pass_filenames: false
        stages: [pre-commit, manual]

      - id: probaboracle-typecheck
        name: probaboracle typecheck
        entry: make typecheck
        language: system
        pass_filenames: false
        stages: [pre-push, manual]

      - id: probaboracle-test
        name: probaboracle test
        entry: make test
        language: system
        pass_filenames: false
        stages: [pre-push, manual]
