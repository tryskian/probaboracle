name: Close stale dependency PRs

on:
  schedule:
    - cron: "0 14 * * *"
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

jobs:
  stale-dependency-prs:
    runs-on: ubuntu-latest
    steps:
      - id: automated-security-fixes
        uses: actions/github-script@v8
        with:
          script: |
            const { data } = await github.request("GET /repos/{owner}/{repo}/automated-security-fixes", {
              owner: context.repo.owner,
              repo: context.repo.repo,
            });
            core.setOutput("enabled", String(Boolean(data.enabled)));

      - uses: actions/stale@v10
        if: steps.automated-security-fixes.outputs.enabled == 'false'
        with:
          repo-token: ${{ secrets.GITHUB_TOKEN }}
          days-before-issue-stale: -1
          days-before-issue-close: -1
          days-before-pr-stale: 14
          days-before-pr-close: 7
          stale-pr-label: stale
          close-pr-label: auto-closed
          stale-pr-message: This dependency PR has gone stale and will be closed in 7 days if it stays inactive.
          close-pr-message: Closing stale dependency PR to keep the queue clean. Reopen or rerun the bump when it becomes active again.
          only-pr-labels: dependencies
          exempt-draft-pr: true
          delete-branch: true
          operations-per-run: 30

      - name: Skip because automated security fixes are enabled
        if: steps.automated-security-fixes.outputs.enabled == 'true'
        run: echo "Skipping stale dependency PR auto-close because automated security fixes are enabled."
